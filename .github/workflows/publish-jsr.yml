name: Publish JSR

on:
  push:
    branches: [main]
    paths:
      - "packages/*/deno.json"
      - ".github/workflows/publish-jsr.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: jsr-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect Package Version Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: changed
        name: Check package versions
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          has_changes=false
          for config in packages/*/deno.json; do
            [ -f "$config" ] || continue

            name="$(jq -r '.name // empty' "$config")"
            version="$(jq -r '.version // empty' "$config")"
            [ -n "$name" ] && [ -n "$version" ] || continue

            old="$(
              git show "$base:$config" 2>/dev/null \
                | jq -c '{name: (.name // ""), version: (.version // "")}' 2>/dev/null \
                || true
            )"
            current="$(jq -c '{name: (.name // ""), version: (.version // "")}' "$config")"

            if [ -z "$old" ]; then
              echo "New package detected: $name@$version"
              has_changes=true
            elif [ "$old" != "$current" ]; then
              echo "Package version changed: $name@$version"
              has_changes=true
            fi
          done

          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          if [ "$has_changes" != "true" ]; then
            echo "No package version changes found."
          fi

  publish:
    name: Publish Workspace
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Publish
        run: npx jsr publish
